name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - name: Create Chrome extension ZIP
        run: cd dist && zip -r ../google-translate-dual-chrome.zip manifest.json content.js style.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            google-translate-dual-chrome.zip
            dist/google-translate-dual.user.js
          generate_release_notes: true
